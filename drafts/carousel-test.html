<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Carousel — Woodlife Carving</title>
  <script src="/scripts/aem.js" type="module"></script>
  <script src="/scripts/scripts.js" type="module"></script>
  <link rel="stylesheet" href="/styles/styles.css">
  <link rel="icon" href="/favicon.ico">
</head>
<body>
  <header></header>
  <main>
    <div>
      <div class="carousel block" data-block-name="carousel" data-block-status="">
        <!-- Slide 1: Festival -->
        <div>
          <div>
            <picture>
              <img
                src="https://placehold.co/1600x900/5c3317/fdf6e3?text=🐻+Woodlife+Festival"
                alt="Woodlife Carving Festival"
                width="1600"
                height="900"
                loading="eager"
              >
            </picture>
          </div>
          <div>
            <h2>Woodlife Carving Festival</h2>
            <p>October 10–12, 2026 · Chester, Vermont</p>
            <p><a href="/festival/">Learn More</a></p>
          </div>
        </div>
        <!-- Slide 2: Shop -->
        <div>
          <div>
            <picture>
              <img
                src="https://placehold.co/1600x900/2d1a0e/fdf6e3?text=🪵+Hand-Carved+Art"
                alt="Hand-carved wooden art"
                width="1600"
                height="900"
                loading="lazy"
              >
            </picture>
          </div>
          <div>
            <h2>Hand-Carved Originals</h2>
            <p>Browse our collection of one-of-a-kind carved pieces.</p>
            <p><a href="/shop/">Shop Now</a></p>
          </div>
        </div>
        <!-- Slide 3: image only -->
        <div>
          <div>
            <picture>
              <img
                src="https://placehold.co/1600x900/d4890a/2d1a0e?text=🏆+Award-Winning+Carvings"
                alt="Award-winning carvings"
                width="1600"
                height="900"
                loading="lazy"
              >
            </picture>
          </div>
          <div></div>
        </div>
      </div>
    </div>
  </main>
  <footer></footer>
</body>
</html>
