name = "woodlife-cdn"
main = "src/index.mjs"
compatibility_date = "2024-01-17"

# Routes require the woodlifecarving.com zone to be active in Cloudflare
# (nameservers switched from Hover) before deploying.
routes = [
  { pattern = "www.woodlifecarving.com/*", zone_name = "woodlifecarving.com" },
  { pattern = "woodlifecarving.com/*", zone_name = "woodlifecarving.com" },
]

[vars]
ORIGIN_HOSTNAME = "main--woodlife-carving--pkoch73.aem.live"
# Set to "disabled" for non-production environments
PUSH_INVALIDATION = "enabled"
